<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Theme Roulette</title>
 <link rel="icon" href="https://www.silhouette-illust.com/wp-content/uploads/2016/12/18915-600x600.jpg" sizes="16×16" type="image/png" />  

<style>

:root{
--bg:#f0f0f0;
--text:#000;
--panel:#fff;
--glow:none;
}

/* デフォルト */
body.default{
--bg:#f0f0f0;
--text:#000;
--panel:#fff;
--glow:none;
}

/* ネオン */
body.neon{
--bg:#050510;
--text:#0ff;
--panel:#111;
--glow:0 0 10px #0ff,0 0 20px #0ff;
}

/* カジノ */
body.casino{
--bg:#003300;
--text:#ffd700;
--panel:#014d01;
--glow:0 0 10px #ffd700;
}

/* ダーク */
body.dark{
--bg:#111;
--text:#eee;
--panel:#222;
--glow:none;
}

body{
margin:0;
font-family:sans-serif;
background:var(--bg);
color:var(--text);
text-align:center;
user-select: none;
  -webkit-user-select: none;
}

h1{
text-shadow:var(--glow);
}

#roulette{
width:320px;
height:320px;
margin:15px auto;
border-radius:50%;
border:5px solid var(--text);
box-shadow:var(--glow);
position:relative;
overflow:hidden;
transition:transform 4s cubic-bezier(.17,.67,.25,1);
}

.slice{
position:absolute;
width:50%;
height:50%;
top:50%;
left:50%;
transform-origin:0 0;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

#pointer{
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:35px solid red;
margin:auto;
}

button{
padding:10px 16px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
background:var(--panel);
color:var(--text);
box-shadow:var(--glow);
}

input{
padding:6px;
}

#items{
max-width:420px;
margin:auto;
}

.item{
display:flex;
justify-content:space-between;
background:var(--panel);
margin:4px;
padding:6px;
border-radius:6px;
}

#result{
font-size:22px;
margin:10px;
}

select{
padding:6px;
}

@media (max-width:600px){

#roulette{
width:260px;
height:260px;
}

.item{
flex-direction:column;
gap:4px;
}

}

</style>
</head>

<body>

<h1>🎯 Theme Roulette</h1>

テーマ:
<select id="themeSelect">
<option value="default">デフォルト</option>
<option value="neon">ネオン</option>
<option value="casino">カジノ</option>
<option value="dark">ダーク</option>
</select>

<div id="pointer"></div>
<div id="roulette"></div>

<button onclick="spin()">回す</button>

<div id="result"></div>

<div>
<input id="newItem" placeholder="項目">
<button onclick="addItem()">追加</button>
<button onclick="clearItems()">全削除</button>
</div>

<div id="items"></div>

<script>

let data=JSON.parse(localStorage.getItem("rouletteData"))||[
{name:"A",weight:1},
{name:"B",weight:1},
{name:"C",weight:1}
]

let theme=localStorage.getItem("rouletteTheme")||"default"

document.body.className=theme
document.getElementById("themeSelect").value=theme

document.getElementById("themeSelect").onchange=e=>{
theme=e.target.value
document.body.className=theme
localStorage.setItem("rouletteTheme",theme)
}

let rotation=0
let spinning=false

const roulette=document.getElementById("roulette")

function save(){
localStorage.setItem("rouletteData",JSON.stringify(data))
}

function draw(){

roulette.innerHTML=""

if(data.length==0)return

const deg=360/data.length

data.forEach((d,i)=>{

const slice=document.createElement("div")
slice.className="slice"

slice.style.background=`hsl(${i*360/data.length},70%,50%)`
slice.style.transform=`rotate(${deg*i}deg) skewY(${90-deg}deg)`

slice.innerHTML=`<div style="transform:skewY(${-(90-deg)}deg) rotate(${deg/2}deg)">${d.name}</div>`

roulette.appendChild(slice)

})

renderList()

}

function renderList(){

const list=document.getElementById("items")
list.innerHTML=""

data.forEach((d,i)=>{

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
<span>${d.name}</span>
確率:<input type="number" value="${d.weight}" min="1"
onchange="changeWeight(${i},this.value)">
<button onclick="removeItem(${i})">削除</button>
`

list.appendChild(div)

})

}

function changeWeight(i,val){
data[i].weight=parseFloat(val)
save()
}

function addItem(){

const input=document.getElementById("newItem")

if(input.value.trim()=="")return

data.push({name:input.value,weight:1})

input.value=""

save()
draw()

}

function removeItem(i){

data.splice(i,1)
save()
draw()

}

function clearItems(){

data=[]
save()
draw()

}

function weightedRandom(){

let total=data.reduce((s,d)=>s+d.weight,0)

let r=Math.random()*total

for(let i=0;i<data.length;i++){

if(r<data[i].weight)return i

r-=data[i].weight

}

}

function spin(){

if(spinning)return
if(data.length==0)return

spinning=true

const index=weightedRandom()

const deg=360/data.length

const spinDeg=360*6+(360-index*deg-deg/2)

rotation+=spinDeg

roulette.style.transform=`rotate(${rotation}deg)`

setTimeout(()=>{

document.getElementById("result").innerText="🎉 "+data[index].name

spinning=false

},4000)

}

draw()

</script>

</body>
</html>
