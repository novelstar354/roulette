<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roulette</title>
 <link rel="icon" href="https://www.silhouette-illust.com/wp-content/uploads/2016/12/18915-600x600.jpg" sizes="16×16" type="image/png" />  


<style>

:root{
--bg:#f0f0f0;
--text:#000;
--panel:#fff;
--glow:none;
}

body.default{--bg:#f0f0f0;--text:#000;--panel:#fff;}
body.neon{--bg:#050510;--text:#0ff;--panel:#111;--glow:0 0 10px #0ff,0 0 20px #0ff;}
body.casino{--bg:#003300;--text:#ffd700;--panel:#014d01;--glow:0 0 10px #ffd700;}
body.dark{--bg:#111;--text:#eee;--panel:#222;}

body{
margin:0;
font-family:sans-serif;
background:var(--bg);
color:var(--text);
text-align:center;
user-select: none;
  -webkit-user-select: none;
}

h1{ text-shadow:var(--glow); }

#pointer{
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:35px solid red;
margin:auto;
}

#roulette{
width:340px;
height:340px;
margin:10px auto;
border-radius:50%;
border:5px solid var(--text);
position:relative;
transition:transform 5s cubic-bezier(.2,.7,.2,1);
overflow:hidden;
box-shadow:var(--glow);
}

canvas{
position:absolute;
left:0;
top:0;
}

button{
padding:10px 16px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
background:var(--panel);
color:var(--text);
box-shadow:var(--glow);
}

input{ padding:6px }

.item{
display:flex;
justify-content:space-between;
background:var(--panel);
margin:4px;
padding:6px;
border-radius:6px;
}

#history{
max-width:400px;
margin:auto;
font-size:14px;
}

#result{
font-size:24px;
margin:10px;
}

@media(max-width:600px){
#roulette{width:260px;height:260px;}
.item{flex-direction:column;gap:4px;}
}

</style>
</head>

<body>

<h1>Roulette</h1>

テーマ
<select id="themeSelect">
<option value="default">デフォルト</option>
<option value="neon">ネオン</option>
<option value="casino">カジノ</option>
<option value="dark">ダーク</option>
</select>

<div id="pointer"></div>

<div id="roulette">
<canvas id="wheel"></canvas>
</div>

<button onclick="spin()">回す</button>

<div id="result"></div>

<div>
<input id="newItem" placeholder="項目">
<button onclick="addItem()">追加</button>
<button onclick="clearItems()">全削除</button>
<button onclick="exportCSV()">CSV保存</button>
</div>

<div id="items"></div>

<h3>履歴</h3>
<div id="history"></div>

<script>

let data=JSON.parse(localStorage.getItem("rouletteData"))||[
{name:"A",weight:1},
{name:"B",weight:1},
{name:"C",weight:1}
]

let theme=localStorage.getItem("rouletteTheme")||"default"

document.body.className=theme
document.getElementById("themeSelect").value=theme

document.getElementById("themeSelect").onchange=e=>{
theme=e.target.value
document.body.className=theme
localStorage.setItem("rouletteTheme",theme)
}

const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")

let size=340
canvas.width=size
canvas.height=size

let rotation=0
let spinning=false

function save(){
localStorage.setItem("rouletteData",JSON.stringify(data))
}

function draw(){

ctx.clearRect(0,0,size,size)

let total=data.reduce((s,d)=>s+d.weight,0)

let start=0

data.forEach((d,i)=>{

let angle=(d.weight/total)*Math.PI*2

ctx.beginPath()
ctx.moveTo(size/2,size/2)

ctx.fillStyle=`hsl(${i*360/data.length},70%,50%)`

ctx.arc(size/2,size/2,size/2,start,start+angle)

ctx.fill()

ctx.save()

ctx.translate(size/2,size/2)
ctx.rotate(start+angle/2)

ctx.fillStyle="#000"
ctx.font="14px sans-serif"
ctx.fillText(d.name,size/4,0)

ctx.restore()

start+=angle

})

renderList()

}

function renderList(){

const list=document.getElementById("items")
list.innerHTML=""

data.forEach((d,i)=>{

let div=document.createElement("div")
div.className="item"

div.innerHTML=`
<input value="${d.name}" onchange="rename(${i},this.value)">
確率:<input type="number" value="${d.weight}" min="1"
onchange="changeWeight(${i},this.value)">
<button onclick="removeItem(${i})">削除</button>
`

list.appendChild(div)

})

}

function rename(i,v){
data[i].name=v
save()
draw()
}

function changeWeight(i,v){
data[i].weight=parseFloat(v)
save()
draw()
}

function addItem(){

let input=document.getElementById("newItem")

if(!input.value)return

data.push({name:input.value,weight:1})

input.value=""

save()
draw()

}

function removeItem(i){

data.splice(i,1)

save()
draw()

}

function clearItems(){

data=[]

save()
draw()

}

function weightedRandom(){

let total=data.reduce((s,d)=>s+d.weight,0)

let r=Math.random()*total

for(let i=0;i<data.length;i++){

if(r<data[i].weight)return i

r-=data[i].weight

}

}

function spin(){

if(spinning||data.length==0)return

spinning=true

if(navigator.vibrate)navigator.vibrate(100)

let index=weightedRandom()

let total=data.reduce((s,d)=>s+d.weight,0)

let start=0
let angle=0

for(let i=0;i<data.length;i++){

let a=(data[i].weight/total)*360

if(i==index){
angle=start+a/2
break
}

start+=a

}

let spinDeg=360*6+(360-angle)

rotation+=spinDeg

document.getElementById("roulette").style.transform=`rotate(${rotation}deg)`

setTimeout(()=>{

let name=data[index].name

document.getElementById("result").innerHTML="🎉 "+name

addHistory(name)

spinning=false

},5000)

}

function addHistory(name){

let h=document.getElementById("history")

let div=document.createElement("div")

div.innerText=name

h.prepend(div)

}

function exportCSV(){

let csv=data.map(d=>`${d.name},${d.weight}`).join("\n")

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="roulette.csv"

a.click()

}

draw()

</script>

</body>
</html>
